
# # # https://github.com/river29/Mellow-LLLBufferPLUS-klipper/blob/add-MDM-Module-Clog-Detection/printer_data/config/mellow-plus.cfg


# # # https://mellow.klipper.cn/en/docs/ProductDoc/ExtensionBoard/fly-buffer-plus/wiring-configuration/mdm-module-integration

# # #####################################################################
# # #                  Mellow LLL Filament Plus Buffer
# # #####################################################################




# ╔══════════════════════════════════════════════════════╗
# ║  CHAÎNE : AFC BYPASS → MDM → LLL PLUS               ║
# ╚══════════════════════════════════════════════════════╝

# =============================================
# MCU LLL PLUS
# =============================================
[mcu LLL_PLUS]
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_30003A000D53575438363820-if00
restart_method: command

# =============================================
# MOTEUR LLL — manual_stepper
# =============================================
[manual_stepper filament_buffer]
step_pin: LLL_PLUS:PA9
dir_pin: !LLL_PLUS:PA8
enable_pin: !LLL_PLUS:PA10
microsteps: 16
full_steps_per_rotation: 200    # moteur 1.8° standard — 932 était invalide
rotation_distance: 18.86        # valeur LLL Plus — à affiner par calibration
velocity: 50                    # mm/s — valeur sûre pour un buffer filament
accel: 500                      # mm/s² — monter progressivement si besoin
# [manual_stepper filament_buffer]
# step_pin: LLL_PLUS:PA9
# dir_pin: !LLL_PLUS:PA8
# enable_pin: !LLL_PLUS:PA10
# microsteps: 16
# rotation_distance: 18.86
# full_steps_per_rotation: 200
# velocity: 200
# accel: 5000

[tmc2209 manual_stepper filament_buffer]
uart_pin: LLL_PLUS:PA13
run_current: 0.40
hold_current: 0.001
stealthchop_threshold: 500

# =============================================
# AFC BYPASS SENSOR
# =============================================
[filament_switch_sensor afc_bypass]
switch_pin: ^LLL_PLUS:PB11
pause_on_runout: False
insert_gcode:  _BYPASS_INSERTED
runout_gcode:  _BYPASS_REMOVED

[gcode_macro _BYPASS_INSERTED]
gcode:
    SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=bypass_active VALUE=1
    # Désactive aussi le LLL si il tournait
    SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=enabled VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=initial_fill VALUE=0
    MANUAL_STEPPER STEPPER=filament_buffer ENABLE=0
    # Désactive la surveillance MDM pendant le bypass
    SET_FILAMENT_SENSOR SENSOR=mdm_runout ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=mdm_clog   ENABLE=0
    M118 Buffer: Mode BYPASS actif — LLL et MDM désactivés

[gcode_macro _BYPASS_REMOVED]
gcode:
    SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=bypass_active VALUE=0
    # Réactive la surveillance MDM
    SET_FILAMENT_SENSOR SENSOR=mdm_runout ENABLE=1
    SET_FILAMENT_SENSOR SENSOR=mdm_clog   ENABLE=1
    M118 Buffer: Bypass retiré — LLL et MDM réactivés

# =============================================
# MDM — DÉTECTION RUPTURE FILAMENT (S)
# =============================================
[filament_switch_sensor mdm_runout]
switch_pin: ^LLL_PLUS:PB10
pause_on_runout: True
event_delay: 1.0
pause_delay: 0.5
runout_gcode:
    M118 MDM: ⚠ Rupture filament détectée !
    PAUSE
insert_gcode:
    M118 MDM: Filament présent


# =============================================
# MDM — DÉTECTION BOUCHON / ENCHEVÊTREMENT (D)
# =============================================
[filament_motion_sensor mdm_clog]
switch_pin: ^LLL_PLUS:PA4
detection_length: 3.5
extruder: extruder
pause_on_runout: True
event_delay: 3.0
pause_delay: 0.5
runout_gcode:
    M118 MDM: ⚠ Bouchon ou enchevêtrement détecté !
    PAUSE
insert_gcode:
    M118 MDM: Flux filament normal

# =============================================
# LLL PLUS — CAPTEURS
# =============================================
[filament_switch_sensor lll_filament_present]
switch_pin: !LLL_PLUS:PB7           # ENDSTOP3 — présence filament
pause_on_runout: False
insert_gcode:  _BUFFER_FILAMENT_INSERTED
runout_gcode:  _BUFFER_FILAMENT_REMOVED

[gcode_button hall1_overfill]
pin: !LLL_PLUS:PB2
press_gcode:   _BUFFER_HALL1_CHANGED HALL=1
release_gcode: _BUFFER_HALL1_CHANGED HALL=0

[gcode_button hall2_burst]
pin: !LLL_PLUS:PB3
press_gcode:   _BUFFER_HALL2_CHANGED HALL=1
release_gcode: _BUFFER_HALL2_CHANGED HALL=0

[gcode_button hall3_fill]
pin: !LLL_PLUS:PB4
press_gcode:   _BUFFER_HALL3_CHANGED HALL=1
release_gcode: _BUFFER_HALL3_CHANGED HALL=0

[gcode_button btn_feed]
pin: !LLL_PLUS:PB12
press_gcode:   _BUFFER_FEED_BTN_CHANGED
release_gcode:

[gcode_button btn_retract]
pin: !LLL_PLUS:PB13
press_gcode:   _BUFFER_RETRACT_BTN_CHANGED
release_gcode:

# =============================================
# VARIABLES GLOBALES
# =============================================
[gcode_macro _BUFFER_VARS]
variable_feed_speed: 50         # mm/s — cohérent avec manual_stepper velocity
variable_feed_accel: 500
variable_enabled: 0
variable_initial_fill: 0
variable_overfill_lock: 0
variable_bypass_active: 0   # ← nouveau : bypass AFC
variable_burst_mm: 35
gcode:

# =============================================
# ÉVÉNEMENTS FILAMENT LLL (ENDSTOP3)
# =============================================
[gcode_macro _BUFFER_FILAMENT_INSERTED]
gcode:
    {% set v = printer["gcode_macro _BUFFER_VARS"] %}
    {% if v.bypass_active == 0 %}
        SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=enabled VALUE=1
        SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=initial_fill VALUE=1
        SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=overfill_lock VALUE=0
        M118 Buffer: Filament détecté — remplissage initial...
        MANUAL_STEPPER STEPPER=filament_buffer ENABLE=1
        _BUFFER_CONTINUOUS_FEED
    {% else %}
        M118 Buffer: Bypass actif — remplissage LLL ignoré
    {% endif %}

[gcode_macro _BUFFER_FILAMENT_REMOVED]
gcode:
    SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=enabled VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=initial_fill VALUE=0
    MANUAL_STEPPER STEPPER=filament_buffer ENABLE=0
    M118 Buffer: Filament retiré — moteur désactivé

# =============================================
# REMPLISSAGE INITIAL
# =============================================
[gcode_macro _BUFFER_CONTINUOUS_FEED]
gcode:
    {% set v = printer["gcode_macro _BUFFER_VARS"] %}
    {% if v.enabled == 1 and v.initial_fill == 1 and v.bypass_active == 0 %}
        MANUAL_STEPPER STEPPER=filament_buffer
            MOVE={ v.burst_mm }
            SPEED={ v.feed_speed }
            ACCEL={ v.feed_accel }
        UPDATE_DELAYED_GCODE ID=_buffer_fill_loop DURATION=0.3
    {% endif %}

[delayed_gcode _buffer_fill_loop]
gcode:
    _BUFFER_CONTINUOUS_FEED

# =============================================
# HALL3 — fin remplissage initial
# =============================================
[gcode_macro _BUFFER_HALL3_CHANGED]
gcode:
    {% if params.HALL|int == 1 %}
        SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=initial_fill VALUE=0
        UPDATE_DELAYED_GCODE ID=_buffer_fill_loop DURATION=0
        M118 Buffer: Remplissage terminé — mode burst actif
    {% endif %}

# =============================================
# HALL2 — burst pendant impression
# =============================================
[gcode_macro _BUFFER_HALL2_CHANGED]
gcode:
    {% set v = printer["gcode_macro _BUFFER_VARS"] %}
    {% if params.HALL|int == 1
          and v.enabled == 1
          and v.initial_fill == 0
          and v.bypass_active == 0 %}
        _BUFFER_FEED_BURST
    {% endif %}

[gcode_macro _BUFFER_FEED_BURST]
gcode:
    {% set v = printer["gcode_macro _BUFFER_VARS"] %}
    {% if v.overfill_lock == 0 %}
        M118 Buffer: Burst { v.burst_mm }mm
        MANUAL_STEPPER STEPPER=filament_buffer
            MOVE={ v.burst_mm }
            SPEED={ v.feed_speed }
            ACCEL={ v.feed_accel }
    {% else %}
        M118 Buffer: Burst ignoré — trop-plein actif
    {% endif %}

# =============================================
# HALL1 — protection trop-plein
# =============================================
[gcode_macro _BUFFER_HALL1_CHANGED]
gcode:
    {% if params.HALL|int == 1 %}
        SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=overfill_lock VALUE=1
        M118 Buffer: ⚠ Trop-plein (HALL1) — alimentation suspendue
    {% else %}
        SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=overfill_lock VALUE=0
        M118 Buffer: Trop-plein résolu — reprise
    {% endif %}

# =============================================
# BOUTONS MANUELS LLL
# =============================================
[gcode_macro _BUFFER_FEED_BTN_CHANGED]
gcode:
    {% set v = printer["gcode_macro _BUFFER_VARS"] %}
    MANUAL_STEPPER STEPPER=filament_buffer
        MOVE=10 SPEED={ v.feed_speed } ACCEL={ v.feed_accel }

[gcode_macro _BUFFER_RETRACT_BTN_CHANGED]
gcode:
    {% set v = printer["gcode_macro _BUFFER_VARS"] %}
    MANUAL_STEPPER STEPPER=filament_buffer
        MOVE=-10 SPEED={ v.feed_speed } ACCEL={ v.feed_accel }

# =============================================
# COMMANDES CONSOLE
# =============================================
[gcode_macro BUFFER_FEED]
description: Alimentation manuelle. Param: MM=30
gcode:
    {% set mm = params.MM|default(30)|float %}
    {% set v = printer["gcode_macro _BUFFER_VARS"] %}
    MANUAL_STEPPER STEPPER=filament_buffer
        MOVE={mm} SPEED={ v.feed_speed } ACCEL={ v.feed_accel }

[gcode_macro BUFFER_RETRACT]
description: Retrait manuel. Param: MM=30
gcode:
    {% set mm = params.MM|default(30)|float %}
    {% set v = printer["gcode_macro _BUFFER_VARS"] %}
    MANUAL_STEPPER STEPPER=filament_buffer
        MOVE=-{mm} SPEED={ v.feed_speed } ACCEL={ v.feed_accel }

[gcode_macro BUFFER_STATUS]
description: État complet de la chaîne de filament
gcode:
    {% set v = printer["gcode_macro _BUFFER_VARS"] %}
    {% set bypass = printer["filament_switch_sensor afc_bypass"].filament_detected %}
    {% set mdm_ok = printer["filament_switch_sensor mdm_runout"].filament_detected %}
    M118 ╔══ FILAMENT CHAIN STATUS ══╗
    M118 AFC Bypass   : { "ACTIF" if bypass else "inactif" }
    M118 MDM Runout   : { "Filament OK" if mdm_ok else "⚠ VIDE" }
    M118 LLL Bypass   : { "oui" if v.bypass_active else "non" }
    M118 LLL Activé   : { v.enabled }
    M118 Fill initial : { v.initial_fill }
    M118 Trop-plein   : { v.overfill_lock }
    M118 Burst config : { v.burst_mm }mm @ { v.feed_speed }mm/s
    M118 ╚═══════════════════════════╝

# =============================================
# GESTION DÉMARRAGE / FIN IMPRESSION
# (à appeler depuis PRINT_START / PRINT_END)
# =============================================
[gcode_macro BUFFER_PRINT_START]
description: À appeler dans PRINT_START
gcode:
    {% set v = printer["gcode_macro _BUFFER_VARS"] %}
    {% if v.bypass_active == 0 %}
        SET_FILAMENT_SENSOR SENSOR=mdm_runout ENABLE=1
        SET_FILAMENT_SENSOR SENSOR=mdm_clog   ENABLE=1
        M118 Buffer: MDM activé pour l'impression
    {% else %}
        M118 Buffer: Bypass actif — MDM non activé
    {% endif %}

[gcode_macro BUFFER_PRINT_END]
description: À appeler dans PRINT_END / CANCEL_PRINT
gcode:
    SET_FILAMENT_SENSOR SENSOR=mdm_clog ENABLE=0
    M118 Buffer: MDM clog désactivé (fin impression)


# ================================================================
# HOOKS HAPPY HARE → LLL BUFFER
# Ces macros surchargent les hooks HH pour suspendre le LLL
# pendant les changements de filament
# ================================================================

# Appelé par Happy Hare à chaque changement d'action MMU
[gcode_macro _MMU_ACTION_CHANGED]
description: Hook HH - suspend/reprend le LLL selon l'action MMU
gcode:
    {% set action = printer.mmu.action %}
    # Actions qui mobilisent le filament (loading, unloading, homing...)
    {% set hh_busy = action not in ["Idle", "Pause", "Complete"] %}
    {% if hh_busy %}
        # Happy Hare en action → geler le LLL et le MDM
        SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=hh_action VALUE=1
        UPDATE_DELAYED_GCODE ID=_buffer_fill_loop DURATION=0
        SET_FILAMENT_SENSOR SENSOR=mdm_clog ENABLE=0
    {% else %}
        # Happy Hare idle → reprendre si filament présent et pas en bypass
        SET_GCODE_VARIABLE MACRO=_BUFFER_VARS VARIABLE=hh_action VALUE=0
        {% set v = printer["gcode_macro _BUFFER_VARS"] %}
        {% if v.bypass_active == 0 %}
            SET_FILAMENT_SENSOR SENSOR=mdm_clog ENABLE=1
        {% endif %}
    {% endif %}


